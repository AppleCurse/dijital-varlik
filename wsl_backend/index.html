<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⬡ DİJİTAL VARLIK — Komuta Merkezi</title>
<style>
:root{--bg:#f0f2f5;--panel:#fff;--border:#dde0e4;--purple:#6d28d9;--green:#059669;--red:#dc2626;--yellow:#d97706;--text:#1a1a2e;--dim:#888}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;font-size:11px;overflow:hidden}
header{background:var(--panel);padding:8px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05)}
header h1{font-size:14px;color:var(--purple);letter-spacing:1px}
.hw-bar{display:flex;gap:12px;font-size:10px}
.hw{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;background:#f0f0f5}
.hw .dot{width:6px;height:6px;border-radius:50%}
.hw .dot.on{background:var(--green)}.hw .dot.off{background:var(--red)}
.hw .val{color:#333;font-weight:600;margin-left:2px}
main{flex:1;display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:6px;overflow:hidden}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.panel-header{background:#f8f9fb;padding:6px 10px;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;flex-shrink:0;font-weight:600}
.panel-body{flex:1;overflow-y:auto;padding:8px;font-size:10px;line-height:1.4}
.cmd-bar{background:var(--panel);padding:6px 10px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;box-shadow:0 -1px 3px rgba(0,0,0,.03)}
.cmd-bar input{flex:1;background:#f8f9fb;border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:#333;font-size:12px;outline:none;font-family:monospace}
.cmd-bar input:focus{border-color:var(--purple);box-shadow:0 0 0 2px rgba(109,40,217,.1)}
.cmd-bar button{background:var(--purple);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-weight:bold;cursor:pointer;font-size:11px}
.log-line{padding:2px 0;border-bottom:1px solid #f0f0f5;font-size:9px;display:flex;gap:6px}
.log-line .ts{color:#bbb;min-width:40px}.log-line .src{color:var(--purple);min-width:50px;font-weight:bold}.log-line .msg{color:#555;flex:1}
.log-line.kod .src{color:var(--green)}.log-line.mahkeme .src{color:var(--yellow)}.log-line.hata .src{color:var(--red)}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.metric{background:#f8f9fb;padding:8px;border-radius:6px;text-align:center}
.metric .val{font-size:18px;font-weight:bold;color:var(--purple)}.metric .label{font-size:8px;color:var(--dim);margin-top:2px}
.svc-row{display:flex;justify-content:space-between;padding:4px 6px;border-radius:4px;margin:1px 0;font-size:9px}
.svc-row:nth-child(odd){background:#f8f9fb}.svc-row .sname{color:var(--dim)}.svc-row .sstat{font-weight:600}
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.quick{background:#f8f9fb;padding:10px;border-radius:6px;text-align:center;cursor:pointer;border:1px solid var(--border);transition:.15s;font-size:9px}
.quick:hover{border-color:var(--purple);background:#f0edff}
.quick .qicon{font-size:22px;display:block;margin-bottom:3px}
.progress-bar{height:4px;background:#e5e7eb;border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--purple);border-radius:2px;transition:width 1s}
@media(max-width:1000px){main{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr 1fr}}
@media(max-width:600px){main{grid-template-columns:1fr;grid-template-rows:auto}}
</style>
</head>
<body>
<header><h1>⬡ DİJİTAL VARLIK</h1><div class="hw-bar" id="hw"></div></header>
<main>
<div class="panel" style="grid-row:span 2"><div class="panel-header">📡 SİSTEM LOGU <span id="log-count">0</span></div><div class="panel-body" id="log-body"></div></div>
<div class="panel"><div class="panel-header">📊 DONANIM</div><div class="panel-body"><div class="metric-grid"><div class="metric"><div class="val" id="m-gpu">-</div><div class="label">GPU VRAM</div><div class="progress-bar"><div class="progress-fill" id="p-gpu" style="width:0%"></div></div></div><div class="metric"><div class="val" id="m-ram">-</div><div class="label">RAM</div><div class="progress-bar"><div class="progress-fill" id="p-ram" style="width:0%"></div></div></div><div class="metric"><div class="val" id="m-cpu">-</div><div class="label">CPU</div></div><div class="metric"><div class="val" id="m-disk">-</div><div class="label">DİSK</div></div></div></div></div>
<div class="panel"><div class="panel-header">🔌 SERVİSLER</div><div class="panel-body" id="svc-body"></div></div>
<div class="panel"><div class="panel-header">⚡ KOMUTLAR</div><div class="panel-body"><div class="quick-grid"><div class="quick" onclick="send('saat')"><span class="qicon">🕐</span>Saat</div><div class="quick" onclick="send('tarih')"><span class="qicon">📅</span>Tarih</div><div class="quick" onclick="send('merhaba')"><span class="qicon">💬</span>Sohbet</div><div class="quick" onclick="send('durum')"><span class="qicon">📊</span>Durum</div><div class="quick" onclick="send('1den 10a topla')"><span class="qicon">💻</span>Kod</div><div class="quick" onclick="send('example.com basligi')"><span class="qicon">🌐</span>Web</div></div></div></div>
<div class="panel" style="grid-column:span 2"><div class="panel-header">🎯 ASPASIA <span id="cmd-stat">HAZIR</span></div><div class="panel-body" id="cmd-body" style="display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--purple)">Mösyö, komutunuzu bekliyorum.</div></div>
</main>
<div class="cmd-bar"><input id="cmd" placeholder="Komut yazın..." onkeydown="if(event.key==='Enter')send()" autofocus><select id="model-select" style="background:#f8f9fb;border:1px solid var(--border);border-radius:8px;padding:10px 8px;color:#333;font-size:11px;outline:none;cursor:pointer"><option value="auto">🤖 OTO (4 katman)</option><option value="deepseek">🟢 DeepSeek</option><option value="9router">🟡 9Router</option><option value="groq">⚡ Groq (ücretsiz)</option><option value="openrouter">🌐 OpenRouter</option></select><button onclick="send()">▶ GÖNDER</button></div>
<script>
const WS_URL='ws://'+location.host+'/ws';let ws=null,rt=null,lc=0;
function conn(){ws=new WebSocket(WS_URL);ws.onopen=()=>{updHW('🟢');log('sistem','Bağlantı kuruldu.');refreshHW()};ws.onclose=()=>{updHW('🔴');clearTimeout(rt);rt=setTimeout(conn,3000)};ws.onmessage=e=>{let p=JSON.parse(e.data);handle(p)}}
function handle(p){
  if(p.type==='log')log(p.source,p.message);
  else if(p.type==='response'){let el=document.getElementById('cmd-body');el.innerHTML='<div style="color:#e0e0e0;font-size:11px;white-space:pre-wrap">'+p.data+'</div>';el.style.alignItems='flex-start';document.getElementById('cmd-stat').textContent=p.source.toUpperCase();log(p.source||'cevap',p.data.substring(0,120))}
  else if(p.type==='status'){log('sistem',p.data);refreshHW()}
  else if(p.type==='capabilities'){let c=document.getElementById('svc-body'),h='',icons={sohbet:'💬',kod:'💻',web:'🌐',goru:'👁️',yuz:'👤',arama:'📚',ses:'🔊',hafiza:'🧠'};for(let[k,v]of Object.entries(p.data))h+='<div class="svc-row"><span class="sname">'+(icons[k]||'?')+' '+k+'</span><span class="sstat" style="color:'+(v?'var(--green)':'var(--red)')+'">'+(v?'AKTİF':'PASİF')+'</span></div>';c.innerHTML=h||'<div class="svc-row">Veri bekleniyor...</div>'}
  else if(p.type==='mahkeme'){log('mahkeme',p.role+': '+p.data.substring(0,150))}
  else if(p.type==='kod'){log('kod',p.data)}
}
function send(v){v=v||document.getElementById('cmd').value.trim();if(!v||!ws)return;let model=document.getElementById('model-select').value;let payload={type:'command',data:v};if(model!=='auto')payload.model=model;ws.send(JSON.stringify(payload));log('komut','> '+v+(model!=='auto'?' ['+model+']':''));document.getElementById('cmd').value='';let el=document.getElementById('cmd-body');el.innerHTML='<div style="color:var(--purple);font-size:13px">İŞLENİYOR ['+model+']...</div>';el.style.alignItems='center';document.getElementById('cmd-stat').textContent='ÇALIŞIYOR'}
function log(src,msg){lc++;let d=document.createElement('div');d.className='log-line'+(src==='kod'?' kod':src==='mahkeme'?' mahkeme':src==='hata'?' hata':'');let t=new Date().toLocaleTimeString().slice(0,5);d.innerHTML='<span class="ts">'+t+'</span><span class="src">['+src.toUpperCase()+']</span><span class="msg">'+msg+'</span>';let lb=document.getElementById('log-body');lb.appendChild(d);while(lb.children.length>300)lb.removeChild(lb.firstChild);lb.scrollTop=lb.scrollHeight;document.getElementById('log-count').textContent=lc}
function updHW(txt){document.getElementById('hw').innerHTML='<span style="color:var(--green)">'+txt+'</span>'}
async function refreshHW(){try{let r=await fetch('/api/status');if(r.ok){let d=await r.json();let h='';h+='<div class="hw"><div class="dot '+(d['9router']=='ON'?'on':'off')+'"></div>9R <span class="val">'+(d['9router']||'?')+'</span></div>';h+='<div class="hw"><div class="dot '+(d.browser=='ON'?'on':'off')+'"></div>Web <span class="val">'+(d.browser||'?')+'</span></div>';h+='<div class="hw">🖥️ <span class="val">'+(d.gpu||'?')+'</span></div>';h+='<div class="hw">📡 <span class="val">'+(d.ram||'?')+'</span></div>';document.getElementById('hw').innerHTML=h}}catch(e){}}
conn();setInterval(refreshHW,10000);
</script>
</body>
</html>
